<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8">
<title>slide</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="slide dark-deep">
  <img class="bg-mountain" src="assets/logo-tight.png" alt="">
  <div class="noise"></div>
  
  <div class="brand-row">
    <div class="logo-lockup">
      <img class="logo-mark" src="assets/logo-tight.png" alt="Zirva">
      <span class="logo-word">Zirva<span class="plus">+</span></span>
    </div>
    <div class="slide-index">
      <span>04 / 05</span>
      <span class="slide-dots"><span></span><span></span><span></span><span class="on"></span><span></span></span>
    </div>
  </div>
  
    <div class="body top">
      <div class="eyebrow">Təsir</div>
      <h1 class="h-display lg" style="margin-top:18px;">Rəqəmlər özü danışır.</h1>
      <div class="stats-grid three mt-40">
    <div class="stat-card">
      <div class="stat-label">Hesabat vaxtı</div>
      <div class="stat-value ">4h → 20m</div>
      <div class="stat-note">Həftəlik hesabat üçün</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Planlama</div>
      <div class="stat-value ">3×</div>
      <div class="stat-note">Daha sürətli dərs planlaması</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Məmnuniyyət</div>
      <div class="stat-value ">98%</div>
      <div class="stat-note">Şagird məmnuniyyəti</div>
    </div></div>
      
    </div>
  <div class="foot"><span>Zəka AI</span><span>Sürüşdürün →</span></div>
</div>
</body>
</html>
