<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8">
<title>slide</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="slide white">
  <img class="bg-mountain" src="assets/logo-tight.png" alt="">
  <div class="noise"></div>
  
  <div class="brand-row">
    <div class="logo-lockup">
      <img class="logo-mark" src="assets/logo-tight.png" alt="Zirva">
      <span class="logo-word">Zirva<span class="plus">+</span></span>
    </div>
    <div class="slide-index">
      <span>03 / 05</span>
      <span class="slide-dots"><span></span><span></span><span class="on"></span><span></span><span></span></span>
    </div>
  </div>
  
    <div class="body top">
      <div class="eyebrow">Nələr edə bilərsiniz</div>
      <h1 class="h-display md" style="margin-top:16px;">Hər şey bir platformada.</h1>
      
      <div class="feat-grid " style="margin-top:28px;">
      <div class="feat accent-purple">
        <div class="feat-icon purple-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="feat-title">Birbaşa mesaj</div>
        <div class="feat-desc">Müəllim–valideyn real vaxt.</div>
      </div>
      <div class="feat accent-coral">
        <div class="feat-icon coral"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></div>
        <div class="feat-title">Məktəb elanları</div>
        <div class="feat-desc">Bütün valideynlərə eyni anda.</div>
      </div>
      <div class="feat accent-teal">
        <div class="feat-icon teal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></div>
        <div class="feat-title">Çoxdilli</div>
        <div class="feat-desc">Az / En / Ru — avtomatik.</div>
      </div>
      <div class="feat accent-gold">
        <div class="feat-icon gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></div>
        <div class="feat-title">Görüş planlaşdırma</div>
        <div class="feat-desc">Valideyn görüşləri bir kliklə.</div>
      </div></div>
    </div>
  <div class="foot"><span>Kommunikasiya</span><span>Sürüşdürün →</span></div>
</div>
